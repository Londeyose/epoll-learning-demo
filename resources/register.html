<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册</title>
    <link rel="stylesheet" href="auth.css">
</head>

<body>
    <div class="phone-wrapper">
        <div class="phone-notch"></div>
        <div class="phone-screen">
            <div class="header-bar">
                <span class="header-tag">SYSTEM</span>
                <span class="header-title">REGISTER MODE</span>
            </div>
            <div class="screen-content">
                <div class="auth-card">
                    <h1 class="auth-title">用户注册</h1>
                    <p class="auth-subtitle">创建账号后即可登录</p>
                    <form id="register-form" class="auth-form" method="post" action="/register">
                        <input class="auth-input" name="username" type="text" placeholder="用户名" autocomplete="username" required>
                        <input class="auth-input" name="password" type="password" placeholder="密码" autocomplete="new-password" required>
                        <button class="auth-button" type="submit">注册</button>
                        <button id="to-login-btn" class="auth-button secondary" type="button">返回登录</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
</body>

</html>
